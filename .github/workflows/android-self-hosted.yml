name: Android CI

on:
  workflow_dispatch:
    inputs:
      app_variant:
        description: App variant to build
        required: false
        default: production
        type: choice
        options:
          - development
          - preview
          - production
  push:
    branches:
      - main
    paths:
      - app.config.js

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    env:
      ANDROID_SDK_ROOT: /usr/local/lib/android/sdk
      JAVA_HOME: /usr/lib/jvm/temurin-17-jdk-amd64
      APP_VARIANT: ${{ inputs.app_variant || 'production' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: false

      - name: Setup Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
            ~/.android/build-cache
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      - name: Cache NDK
        uses: actions/cache@v4
        with:
          path: |
            android/app/.cxx
            android/.gradle
          key: ${{ runner.os }}-ndk-${{ hashFiles('android/**/*.gradle*') }}
          restore-keys: |
            ${{ runner.os }}-ndk-

      - name: Install dependencies
        run: |
          npm ci

      - name: Configure Android SDK path
        run: |
          printf "sdk.dir=%s\n" "$ANDROID_SDK_ROOT" > android/local.properties

      - name: Decode keystore
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/release.keystore

      - name: Decode Play Store JSON
        if: ${{ env.APP_VARIANT == 'production' }}
        run: |
          echo "${{ secrets.PLAY_STORE_JSON_BASE64 }}" | base64 -d > /tmp/play-store-key.json

      - name: Build Android artifact
        env:
          ANDROID_KEYSTORE_PATH: /tmp/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          chmod +x ./gradlew
          if [ "$APP_VARIANT" = "preview" ]; then
            ./gradlew assembleRelease
          else
            ./gradlew bundleRelease
          fi

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-${{ env.APP_VARIANT }}-artifact
          path: |
            android/app/build/outputs/**/*.aab
            android/app/build/outputs/**/*.apk
      - name: Fastlane deploy
        if: ${{ env.APP_VARIANT == 'production' }}
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SUPPLY_JSON_KEY: /tmp/play-store-key.json
          ANDROID_APPLICATION_ID: ${{ vars.ANDROID_APPLICATION_ID || 'com.shifashareef' }}
          PLAY_TRACK: ${{ vars.PLAY_TRACK || 'alpha' }}
          SKIP_ANDROID_BUILD: "true"
          ANDROID_KEYSTORE_PATH: /tmp/release.keystore
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          bundle install
          fastlane android deploy

